services:
  money-manager:
    build: .
    container_name: money-manager
    environment:
      PORT: 3000
      DATA_DIR: /data
      DATABASE_PATH: /data/money-manager.sqlite
    ports:
      - "3000:3000"
    volumes:
      # Bind mount: database survives container restarts and rebuilds (./data on the host)
      - ./data:/data
    restart: unless-stopped
